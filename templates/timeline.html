<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarID Timeline</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <button onclick="window.location.href='/'">Homepage</button>
        <button onclick="window.location.href='/timeline'" class="active">Timeline</button>
    </nav>
    
    <div class="timeline-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Activity Feed</h2>
            <button id="edit-selected-btn" style="padding: 8px 15px; background-color: gray; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">✎ Edit Selected</button>
        </div>
        <div id="feed">
            <!-- Timeline items will be injected here -->
        </div>
    </div>

    <!-- Edit Label Modal -->
    <div id="edit-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Correct Label</h3>
            <p>Select the correct identity for this vehicle:</p>
            <input list="edit-car-list" id="edit-car-select" placeholder="Search color, make, model...">
            <datalist id="edit-car-list">
                <!-- populated dynamically -->
            </datalist>
            <div style="margin-top: 15px;">
                <button id="edit-save-btn">Save</button>
                <button onclick="document.getElementById('edit-modal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/js/timeline.js"></script>
</body>
</html>
