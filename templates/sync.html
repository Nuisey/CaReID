<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarID Sync Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script defer src="/static/js/sync.js"></script>
    <style>
        .metrics-bar {
            display: flex;
            gap: 20px;
            background-color: #333;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            justify-content: space-around;
        }
        .metric {
            text-align: center;
        }
        .metric h2 { margin: 0; color: #007bff; font-size: 2em; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .track-card {
            background-color: #333;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid transparent;
            position: relative;
        }
        .track-card.agree {
            border-color: #28a745;
        }
        .track-card.disagree {
            border-color: #dc3545;
        }
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
        }
        .carousel img {
            height: 120px;
            border-radius: 4px;
            object-fit: cover;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin: 0 20px;
        }
        .btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        
        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <button onclick="window.location.href='/'">Map</button>
        <button onclick="window.location.href='/live'">Live</button>
        <button class="active" onclick="window.location.href='/sync'">Sync</button>
    </div>

    <div class="metrics-bar">
        <div class="metric">
            <h2 id="metric-unconfirmed">0</h2>
            <span>Unconfirmed Tracks</span>
        </div>
        <div class="metric">
            <h2 id="metric-total-images" style="color: #17a2b8;">0</h2>
            <span>Total Un-synced Images</span>
        </div>
        <div class="metric">
            <h2 id="metric-checking" style="color: #ffc107;">0</h2>
            <span>Gemini Checking</span>
        </div>
        <div class="metric">
            <h2 id="metric-checked" style="color: #28a745;">0</h2>
            <span>Gemini Checked</span>
        </div>
    </div>

    <div style="margin: 0 20px; padding: 15px; background: #0a0a0a; border-radius: 8px; height: 100px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 14px; color: #0f0; box-shadow: inset 0 0 10px black; border: 1px solid #333;" id="sync-logs">
        <div style="color: #888;">[System] Sync dashboard initialized. Waiting for batch checks...</div>
    </div>

    <div class="controls" style="margin-top: 20px;">
        <button class="btn" id="btn-run-gemini">Gemini Check</button>
        <button class="btn" style="background-color: #dc3545;" id="btn-cancel-gemini">Cancel</button>
    </div>
    <div id="batch-time-display" style="text-align: left; margin: 5px 20px 0 20px; font-size: 13px; color: #888; font-weight: bold; min-height: 18px;"></div>

    <div class="grid-container" id="sync-grid">
        <!-- Track cards will be populated here -->
    </div>
</body>
</html>
